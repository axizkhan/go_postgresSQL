version: "3.9"

services:
  api:
    build: .
    ports:
      - "8080:8080"

    environment:
      PORT: 8080
      APP_ENV: developement
      DATABASE_URL: postgres://postgres:password@db:5432/user_dob_api?sslmode=disable

    depends_on:
      - db

  db:
    image: postgres:16-alpine

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_dob_api

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
